name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: ./run build

      - name: Verify output
        run: |
          test -f dist/flash-live-system
          grep -q "BUSYBOX_EOF" dist/flash-live-system

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck source script
        run: shellcheck flash-live-system

      - name: Shellcheck run script
        run: shellcheck run

  version-bump-check:
    uses: hatlabs/shared-workflows/.github/workflows/version-bump-check.yml@main
